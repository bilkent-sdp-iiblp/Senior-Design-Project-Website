<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
{% seo %}
{% include head-custom.html %}
    <script>
      (function() {
        var saved = localStorage.getItem("theme");
        if (saved === "dark" || saved === "light") {
          document.documentElement.setAttribute("data-theme", saved);
          return;
        }
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div class="wrapper">
      <header class="site-header">
        <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title | default: site.github.repository_name }}</a>
        <div class="site-controls">
          <button class="theme-toggle" type="button" aria-label="Switch theme" title="Switch theme">
            <span class="theme-toggle-icon" aria-hidden="true">☀</span>
          </button>
          <nav class="site-nav" aria-label="Main navigation">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/demo/' | relative_url }}">Demo</a>
            <a href="{{ '/about/' | relative_url }}">About and Documents</a>
          </nav>
        </div>
        {% if site.logo %}
          <img src="{{ site.logo }}" alt="Logo" class="logo">
        {% endif %}
      </header>
      <main class="site-content">
        {{ content }}
      </main>
      <footer class="site-footer">
        <p>Ubien Senior Design Project Website</p>
        <p><small>Bilkent University CS 491/492</small></p>
      </footer>
    </div>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
    <script>
      (function() {
        var root = document.documentElement;
        var btn = document.querySelector(".theme-toggle");
        if (!btn) return;

        var icon = btn.querySelector(".theme-toggle-icon");

        var applyState = function() {
          var dark = root.getAttribute("data-theme") === "dark";
          btn.setAttribute("aria-label", dark ? "Switch to light mode" : "Switch to dark mode");
          btn.setAttribute("title", dark ? "Switch to light mode" : "Switch to dark mode");
          if (icon) icon.textContent = dark ? "☾" : "☀";
        };

        applyState();
        btn.addEventListener("click", function() {
          var dark = root.getAttribute("data-theme") === "dark";
          var next = dark ? "light" : "dark";
          root.setAttribute("data-theme", next);
          localStorage.setItem("theme", next);
          applyState();
        });
      })();
    </script>
  </body>
</html>
